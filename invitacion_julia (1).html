<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación — Cumpleaños</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    font-family: 'Cormorant Garamond', serif;
    padding: 2rem 1rem;
  }
  .card {
    background: #111111;
    border: 1px solid #3a3000;
    border-radius: 16px;
    max-width: 400px;
    width: 100%;
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    box-shadow: 0 4px 60px rgba(255,210,0,0.08);
  }
  .deco {
    font-size: 20px;
    color: #ffd200;
    letter-spacing: 10px;
    margin-bottom: 1.5rem;
  }
  .pre {
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c9a800;
    margin-bottom: 0.4rem;
  }
  .name {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-style: italic;
    color: #ffd200;
    margin: 0.2rem 0 1.2rem;
    line-height: 1.2;
  }
  .msg {
    font-size: 17px;
    line-height: 1.8;
    color: #e8d080;
    font-style: italic;
    margin-bottom: 1.5rem;
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1.5rem 0;
    color: #ffd200;
    font-size: 16px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: #3a3000;
  }
  .details {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 0.5rem;
  }
  .detail-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 16px;
    color: #e8d080;
  }
  .detail-row svg {
    color: #ffd200;
    flex-shrink: 0;
  }
  .footer {
    margin-top: 2rem;
    font-size: 14px;
    color: #c9a800;
    font-style: italic;
    letter-spacing: 1px;
  }
  .map-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 1.5rem;
    padding: 10px 22px;
    border: 1px solid #ffd200;
    border-radius: 50px;
    color: #ffd200;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    text-decoration: none;
    letter-spacing: 1px;
    transition: background 0.2s, color 0.2s;
  }
  .map-link:hover {
    background: #ffd200;
    color: #0a0a0a;
  }
</style>
</head>
<body>
<div class="card">
  <div class="deco">✦ ✦ ✦</div>
  <div class="pre">Te invito a celebrar</div>
  <div class="name">Julia Rivarola</div>
  <div class="msg">
    ¿Querés acompañarme esta noche especial<br>y festejar juntos mi cumpleaños?
  </div>

  <div class="divider">✦</div>

  <div class="details">
    <div class="detail-row">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Sábado, 28 de junio de 2025
    </div>
    <div class="detail-row">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      20:30 — 21:00 hs
    </div>
    <div class="detail-row">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Bar El Secreto · Rosario
    </div>
  </div>

  <a class="map-link" href="https://www.google.com/maps/search/?api=1&query=Bar+El+Secreto+Rosario+Argentina" target="_blank">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    Ver en el mapa
  </a>

  <div class="divider">✦</div>
  <div class="footer">Con amor, te espero ✦</div>
</div>
</body>
</html>
